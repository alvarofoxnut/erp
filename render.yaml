# Render Blueprint — import in Render Dashboard → New → Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: makhana-erp-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_CROSS_ORIGIN
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: LOG_LEVEL
        value: info
